<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>輔具盤點管理系統</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app">
    <!-- 導航列 -->
    <nav class="navbar" id="navbar" style="display: none;">
      <div class="nav-brand">
        <i class="fas fa-clipboard-check"></i>
        <span>輔具盤點系統</span>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab" data-view="scan">
          <i class="fas fa-qrcode"></i>
          <span>掃描盤點</span>
        </button>
        <button class="nav-tab" data-view="list">
          <i class="fas fa-list"></i>
          <span>輔具清單</span>
        </button>
        <button class="nav-tab" data-view="loan">
          <i class="fas fa-handshake"></i>
          <span>外借管理</span>
        </button>
        <button class="nav-tab active" data-view="my">
          <i class="fas fa-user"></i>
          <span>我的輔具</span>
        </button>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span id="currentUserName"></span>
      </button>
    </nav>

    <div class="content">
      <!-- 登入頁面 -->
      <div id="loginView" class="view active">
        <div class="login-container">
          <div class="login-card">
            <div class="login-header">
              <i class="fas fa-clipboard-check"></i>
              <h1>輔具盤點管理系統</h1>
              <p>屏東縣輔具資源中心</p>
            </div>
            
            <div class="login-body">
              <div class="form-group">
                <label>選擇人員</label>
                <select id="staffSelect" class="form-control">
                  <option value="">請選擇...</option>
                </select>
              </div>
              
              <button id="loginBtn" class="btn btn-primary btn-large">
                <i class="fas fa-sign-in-alt"></i> 登入系統
              </button>
            </div>
            
            <div class="login-footer">
              <p>屏中區 + 屏北區整合版</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 掃描盤點頁面 -->
      <div id="scanView" class="view">
        <div class="container">
          <h2><i class="fas fa-qrcode"></i> 掃描盤點</h2>
          
          <div class="scan-instructions">
            <p><i class="fas fa-info-circle"></i> 使用手機相機掃描輔具條碼進行盤點</p>
            <p style="font-size: 0.875rem; color: #9CA3AF; margin-top: 0.5rem;">
              測試模式：點選「測試掃描」按鈕手動輸入財產編號
            </p>
          </div>
          
          <div id="scannerContainer" class="scanner-container" style="display: none;">
            <video id="scannerVideo" autoplay playsinline></video>
            <canvas id="scannerCanvas" style="display: none;"></canvas>
            <div class="scanner-overlay">
              <div class="scanner-frame"></div>
              <p class="scanner-hint">將條碼對準框內</p>
            </div>
          </div>
          
          <div class="scan-controls">
            <button id="startScanBtn" class="btn btn-primary">
              <i class="fas fa-camera"></i> 開始掃描
            </button>
            <button id="stopScanBtn" class="btn btn-secondary" style="display: none;">
              <i class="fas fa-stop"></i> 停止掃描
            </button>
            <button onclick="testScan()" class="btn btn-secondary">
              <i class="fas fa-keyboard"></i> 測試掃描
            </button>
          </div>
          
          <div id="scanResult" class="scan-result" style="display: none;"></div>
        </div>
      </div>

      <!-- 輔具清單頁面 -->
      <div id="listView" class="view">
        <div class="container">
          <h2><i class="fas fa-list"></i> 輔具清單</h2>
          
          <div class="filter-section">
            <div class="filter-group">
              <label>區域篩選</label>
              <select id="filterArea" class="form-control">
                <option value="">全部區域</option>
                <option value="屏中區">屏中區</option>
                <option value="屏北區">屏北區</option>
              </select>
            </div>
            
            <div class="filter-group">
              <label>狀態篩選</label>
              <select id="filterStatus" class="form-control">
                <option value="">全部狀態</option>
                <option value="展示中">展示中</option>
                <option value="外借中">外借中</option>
                <option value="維護中">維護中</option>
                <option value="報廢">報廢</option>
              </select>
            </div>
            
            <button id="applyFilterBtn" class="btn btn-primary">
              <i class="fas fa-filter"></i> 套用篩選
            </button>
          </div>
          
          <div class="search-section">
            <div class="search-group">
              <i class="fas fa-search"></i>
              <input type="text" id="searchInput" class="form-control" 
                     placeholder="搜尋財產編號、保管人、品名、地點...">
            </div>
            <div class="count-display">
              <span id="equipmentCount">共 0 筆</span>
            </div>
          </div>
          
          <div id="equipmentList" class="equipment-list">
            <div class="loading">載入中...</div>
          </div>
        </div>
      </div>

      <!-- 外借管理頁面 -->
      <div id="loanView" class="view">
        <div class="container">
          <h2><i class="fas fa-handshake"></i> 外借管理</h2>
          <p class="subtitle">目前外借中的輔具</p>
          
          <div class="loan-tabs">
            <button class="loan-tab active" data-area="">全部</button>
            <button class="loan-tab" data-area="屏北區">屏北區</button>
            <button class="loan-tab" data-area="屏中區">屏中區</button>
          </div>
          
          <div class="count-display">
            <span id="loanCount">共 0 筆</span>
          </div>
          
          <div id="loanList" class="loan-list">
            <div class="loading">載入中...</div>
          </div>
        </div>
      </div>

      <!-- 我的輔具頁面 -->
      <div id="myView" class="view">
        <div class="container">
          <h2><i class="fas fa-user"></i> 我的輔具清單</h2>
          <p class="subtitle">顯示您負責管理的輔具</p>
          
          <div class="my-tabs">
            <button class="my-tab active" data-inventory-status="">全部</button>
            <button class="my-tab" data-inventory-status="inventoried">已盤點</button>
            <button class="my-tab" data-inventory-status="not-inventoried">未盤點</button>
          </div>
          
          <div class="search-section">
            <div class="search-group">
              <i class="fas fa-search"></i>
              <input type="text" id="mySearchInput" class="form-control" 
                     placeholder="搜尋財產編號、庫存編號或輔具品名...">
            </div>
            <div class="count-display">
              <span id="myEquipmentCount">共 0 筆</span>
            </div>
          </div>
          
          <div id="myEquipmentList" class="equipment-list">
            <div class="loading">載入中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div id="toast" class="toast"></div>
  
  <!-- Loading 指示器 -->
  <div id="loader" class="loader">
    <div class="spinner"></div>
    <p>處理中...</p>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
